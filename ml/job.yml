$schema: https://azuremlschemas.azureedge.net/latest/commandJob.schema.json
type: command
experiment_name: churn-training
display_name: churn-train-register
code: ..
command: >-
  python src/train.py
  --data data/churn.csv
  --model-output ${{outputs.model_output}}
environment: azureml:churn-sklearn-env@latest
compute: azureml:cpu-cluster
outputs:
  model_output:
    type: uri_folder

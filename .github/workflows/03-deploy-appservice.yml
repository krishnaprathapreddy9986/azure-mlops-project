name: 03 Deploy App Service UI

on:
  workflow_dispatch:
  workflow_run:
    workflows:
      - 02 Deploy Azure ML Endpoint
    types:
      - completed
  push:
    branches:
      - main
    paths:
      - app/**
      - .github/workflows/03-deploy-appservice.yml

permissions:
  contents: read

env:
  AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
  AZURE_ML_WORKSPACE: ${{ vars.AZURE_ML_WORKSPACE }}
  AZURE_WEBAPP_NAME: ${{ vars.AZURE_WEBAPP_NAME }}
  AML_ENDPOINT_NAME: ${{ vars.AML_ENDPOINT_NAME || 'churn-endpoint' }}

jobs:
  deploy-app:
    name: Deploy Flask UI
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Install Azure ML CLI extension
        run: |
          az extension add --name ml --upgrade --yes

      - name: Validate required variables
        run: |
          test -n "${AZURE_RESOURCE_GROUP}" || (echo "Missing repo variable AZURE_RESOURCE_GROUP" && exit 1)
          test -n "${AZURE_ML_WORKSPACE}" || (echo "Missing repo variable AZURE_ML_WORKSPACE" && exit 1)
          test -n "${AZURE_WEBAPP_NAME}" || (echo "Missing repo variable AZURE_WEBAPP_NAME" && exit 1)

      - name: Read Azure ML endpoint settings
        id: aml
        run: |
          scoring_uri=$(az ml online-endpoint show \
            --name "${AML_ENDPOINT_NAME}" \
            --resource-group "${AZURE_RESOURCE_GROUP}" \
            --workspace-name "${AZURE_ML_WORKSPACE}" \
            --query scoring_uri \
            --output tsv)

          endpoint_key=$(az ml online-endpoint get-credentials \
            --name "${AML_ENDPOINT_NAME}" \
            --resource-group "${AZURE_RESOURCE_GROUP}" \
            --workspace-name "${AZURE_ML_WORKSPACE}" \
            --query primaryKey \
            --output tsv)

          echo "::add-mask::${endpoint_key}"
          echo "scoring_uri=${scoring_uri}" >> "$GITHUB_OUTPUT"
          echo "endpoint_key=${endpoint_key}" >> "$GITHUB_OUTPUT"

      - name: Configure App Service settings
        run: |
          az webapp config appsettings set \
            --name "${AZURE_WEBAPP_NAME}" \
            --resource-group "${AZURE_RESOURCE_GROUP}" \
            --settings \
              AML_ENDPOINT_URL="${{ steps.aml.outputs.scoring_uri }}" \
              AML_ENDPOINT_KEY="${{ steps.aml.outputs.endpoint_key }}" \
              SCM_DO_BUILD_DURING_DEPLOYMENT=true \
              ENABLE_ORYX_BUILD=true

          az webapp config set \
            --name "${AZURE_WEBAPP_NAME}" \
            --resource-group "${AZURE_RESOURCE_GROUP}" \
            --startup-file "gunicorn --bind=0.0.0.0 --timeout 600 app:app"

      - name: Package Flask app
        run: |
          cd app
          zip -r ../app.zip .

      - name: Deploy Flask app to App Service
        run: |
          az webapp deploy \
            --name "${AZURE_WEBAPP_NAME}" \
            --resource-group "${AZURE_RESOURCE_GROUP}" \
            --src-path app.zip \
            --type zip

      - name: Show App Service URL
        run: |
          echo "https://${AZURE_WEBAPP_NAME}.azurewebsites.net"

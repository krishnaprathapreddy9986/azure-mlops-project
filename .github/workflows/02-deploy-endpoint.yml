name: 02 Deploy Azure ML Endpoint

on:
  workflow_dispatch:
  workflow_run:
    workflows:
      - 01 Train and Register Churn Model
    types:
      - completed

permissions:
  contents: read

env:
  AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
  AZURE_ML_WORKSPACE: ${{ vars.AZURE_ML_WORKSPACE }}
  AML_ENDPOINT_NAME: ${{ vars.AML_ENDPOINT_NAME || 'churn-endpoint' }}
  AML_DEPLOYMENT_NAME: ${{ vars.AML_DEPLOYMENT_NAME || 'blue' }}

jobs:
  deploy-endpoint:
    name: Deploy endpoint
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Install Azure ML CLI extension
        run: |
          az extension add --name ml --upgrade --yes

      - name: Validate required variables
        run: |
          test -n "${AZURE_RESOURCE_GROUP}" || (echo "Missing repo variable AZURE_RESOURCE_GROUP" && exit 1)
          test -n "${AZURE_ML_WORKSPACE}" || (echo "Missing repo variable AZURE_ML_WORKSPACE" && exit 1)

      - name: Create endpoint if needed
        run: |
          if az ml online-endpoint show \
            --name "${AML_ENDPOINT_NAME}" \
            --resource-group "${AZURE_RESOURCE_GROUP}" \
            --workspace-name "${AZURE_ML_WORKSPACE}" > /dev/null 2>&1; then
            echo "Endpoint ${AML_ENDPOINT_NAME} already exists."
          else
            az ml online-endpoint create \
              --file ml/endpoint.yml \
              --resource-group "${AZURE_RESOURCE_GROUP}" \
              --workspace-name "${AZURE_ML_WORKSPACE}"
          fi

      - name: Create or update deployment
        run: |
          if az ml online-deployment show \
            --name "${AML_DEPLOYMENT_NAME}" \
            --endpoint-name "${AML_ENDPOINT_NAME}" \
            --resource-group "${AZURE_RESOURCE_GROUP}" \
            --workspace-name "${AZURE_ML_WORKSPACE}" > /dev/null 2>&1; then
            az ml online-deployment update \
              --file ml/deployment.yml \
              --resource-group "${AZURE_RESOURCE_GROUP}" \
              --workspace-name "${AZURE_ML_WORKSPACE}"
          else
            az ml online-deployment create \
              --file ml/deployment.yml \
              --resource-group "${AZURE_RESOURCE_GROUP}" \
              --workspace-name "${AZURE_ML_WORKSPACE}"
          fi

      - name: Route all traffic to deployment
        run: |
          az ml online-endpoint update \
            --name "${AML_ENDPOINT_NAME}" \
            --traffic "${AML_DEPLOYMENT_NAME}=100" \
            --resource-group "${AZURE_RESOURCE_GROUP}" \
            --workspace-name "${AZURE_ML_WORKSPACE}"

      - name: Show endpoint details
        run: |
          az ml online-endpoint show \
            --name "${AML_ENDPOINT_NAME}" \
            --resource-group "${AZURE_RESOURCE_GROUP}" \
            --workspace-name "${AZURE_ML_WORKSPACE}" \
            --query "{name:name, scoring_uri:scoring_uri, auth_mode:auth_mode, traffic:traffic}" \
            --output table
